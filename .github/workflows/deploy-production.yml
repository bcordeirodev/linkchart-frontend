# ===========================================
# GITHUB ACTIONS WORKFLOW - PRODUÇÃO
# Link Chart Frontend - Deploy Automatizado
# ===========================================

name: 🚀 Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

# Definir variáveis globais
env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend

# Definir permissões necessárias
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ===========================================
  # JOB 1: BUILD RÁPIDO (SEM VALIDAÇÕES)
  # ===========================================
  quick-build:
    name: ⚡ Quick Build & Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          npm ci --prefer-offline --no-audit
          
      # ===========================================
      # VERIFICAÇÕES AVANÇADAS (COMENTADAS PARA DEPLOY RÁPIDO)
      # ===========================================
      
      # LINT CHECK (Descomente para ativar)
      # - name: 🔍 Run ESLint
      #   run: npm run lint
      #   continue-on-error: false

      # TYPESCRIPT CHECK (Descomente para ativar)
      # - name: 🔧 TypeScript Check
      #   run: npx tsc --noEmit
      #   continue-on-error: false

      # PRETTIER CHECK (Descomente para ativar)
      # - name: 💅 Format Check
      #   run: npm run format:check
      #   continue-on-error: false

      # TESTES UNITÁRIOS (Descomente para ativar)
      # - name: 🧪 Run Tests
      #   run: npm test
      #   continue-on-error: false

      # AUDIT DE SEGURANÇA (Descomente para ativar)
      # - name: 🔒 Security Audit
      #   run: npm audit --audit-level=moderate
      #   continue-on-error: false

      # ===========================================
      # BUILD ESSENCIAL (MANTIDO)
      # ===========================================
      
      - name: 🏗️ Production Build
        run: |
          npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          STANDALONE: true

      - name: ✅ Build Success
        run: |
          echo "## 🚀 Build Rápido Concluído" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Dependencies**: Instaladas" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Build**: Next.js compilado" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ **Status**: Pronto para deploy" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # JOB 2: BUILD E PUSH DA IMAGEM DOCKER
  # ===========================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quick-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # ===========================================
      # BUILD DOCKER (SINGLE-PLATFORM PARA VELOCIDADE)
      # ===========================================
      # Nota: Build apenas para linux/amd64 para evitar problemas com Tailwind CSS 4.0
      # Para ativar multi-platform (amd64 + arm64), descomente a linha abaixo e
      # configure as variáveis de ambiente necessárias no Dockerfile
      # platforms: linux/amd64,linux/arm64
      
      - name: 🏗️ Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1

  # ===========================================
  # JOB 3: DEPLOY PARA PRODUÇÃO
  # ===========================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # HEALTH CHECK (Comentado para implementação futura)
      # - name: 🏥 Health Check
      #   run: |
      #     echo "Performing health check..."
      #     # curl -f http://your-app-url/api/health || exit 1
      #   continue-on-error: false

      - name: 📋 Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ needs.build-and-push.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: ${{ needs.build-and-push.outputs.image-digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY

      # DEPLOY REAL (Comentado - implementar conforme sua infraestrutura)
      # - name: 🚀 Deploy to DigitalOcean
      #   run: |
      #     echo "Deploying to DigitalOcean..."
      #     # Implementar deploy real aqui
      #     # Exemplo: kubectl, docker-compose, etc.

  # ===========================================
  # JOB 4: NOTIFICAÇÕES (OPCIONAL)
  # ===========================================
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [quick-build, build-and-push, deploy]
    if: always()

    steps:
      - name: 📊 Job Status Summary
        run: |
          echo "## 📊 Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation**: ${{ needs.validate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build & Push**: ${{ needs.build-and-push.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy**: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed or was skipped**" >> $GITHUB_STEP_SUMMARY
          fi

      # SLACK/DISCORD NOTIFICATIONS (Comentado para implementação futura)
      # - name: 📱 Slack Notification
      #   if: always()
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: ${{ job.status }}
      #     channel: '#deployments'
      #     webhook_url: ${{ secrets.SLACK_WEBHOOK }}
